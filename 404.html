<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Ninja Vanished | Amin Bedra</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .ninja-icon {
            font-size: 5rem;
            color: #2ecc71; /* Ninja Green */
            margin-bottom: 20px;
            animation: smoke 2s ease-out infinite;
        }

        @keyframes smoke {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.2); filter: blur(5px); }
            100% { opacity: 1; transform: scale(1); }
        }

        h1 { font-size: 3rem; margin: 10px 0; }
        p { font-size: 1.2rem; color: #ccc; margin-bottom: 30px; }

        .btn {
            padding: 12px 30px;
            background: #2ecc71;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #27ae60;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="ninja-icon">
        <i class="fas fa-user-ninja"></i>
    </div>

    <h1>404: Ninja Vanished</h1>
    <p>The page you are looking for has been hidden by a smoke bomb.</p>

    <a href="index.html" class="btn">Return to the Dojo</a>

</body>
</html>
